<div class="page">
  <h1>{{ isEditMode ? 'Könyv szerkesztése' : 'Új könyv' }}</h1>

  <div *ngIf="error" class="error">{{ error }}</div>

  <form (ngSubmit)="save()" #bookForm="ngForm">
    <label>
      Cím
      <input name="title" [(ngModel)]="book.title" required />
    </label>

    <label>
      Szerző
      <input name="author" [(ngModel)]="book.author" required />
    </label>

    <label>
      Műfaj
      <input name="genre" [(ngModel)]="book.genre" required />
    </label>

    <label>
      Kiadás éve
      <input type="number" name="publishedYear" [(ngModel)]="book.publishedYear" required />
    </label>

    <label>
      Elérhető példányok
      <input type="number" name="availableCopies" [(ngModel)]="book.availableCopies" required />
    </label>

    <div class="actions">
      <button type="submit" class="btn primary">Mentés</button>
      <a routerLink="/" class="btn">Mégse</a>
    </div>
  </form>
</div>
