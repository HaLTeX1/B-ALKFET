services:
  mongo:
    image: mongo:8
    container_name: bookflow-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend/BookFlow.Api
      dockerfile: Dockerfile
    container_name: bookflow-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      MongoDbSettings__ConnectionString: mongodb://admin:admin123@mongo:27017
      MongoDbSettings__DatabaseName: bookflowdb
      MongoDbSettings__BooksCollectionName: books
    ports:
      - "5245:8080"

  frontend:
    build:
      context: ./frontend/bookflow-web
      dockerfile: Dockerfile
    container_name: bookflow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  mongo_data:
